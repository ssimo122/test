<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>재해대응본부 업무적성검사</title>

<!-- ============================================================
  점수 / 결과 판정 기준 (참고용 주석)
  ------------------------------------------------------------
  · 평가 항목 3가지
      - 인지(cog) : 기준점 0
      - 해결(res) : 기준점 0
      - 폐급(rej) : 누적 점수

  · 인지(cog)
      - 최종 점수 0 이상(0 또는 양수) → 대문자 A = "현실"
      - 최종 점수 음수            → 소문자 a = "이상"

  · 해결(res)
      - 최종 점수 0 이상(0 또는 양수) → 대문자 B = "상황"
      - 최종 점수 음수            → 소문자 b = "사람"

  · 폐급(rej)
      - 폐급 점수가 3점 이상이면 인지/해결 점수와 무관하게
        무조건 결과를 C 로 판정한다.

  · 최종 결과 조합
      AB → 재해피해자생환요령작성팀
      Ab → 실종자수색팀
      aB → 재해진압팀
      ab → 현장분석팀
      C  → 부적격 판정
============================================================ -->

<style>
  /* @import는 반드시 다른 규칙보다 먼저 와야 한다 (갈무리 대체 폰트) */
  @import url('https://cdn.jsdelivr.net/npm/galmuri/dist/galmuri.css');

  /* 8비트(둥근모꼴 / 210 8비트 풍) 픽셀 폰트 로드 */
  @font-face {
    font-family: 'DungGeunMo';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    height: 100%;
    background: #000000;
    color: #ffffff;
  }

  body {
    font-family: 'Galmuri11', 'DungGeunMo', monospace;
    font-size: 17px;
    line-height: 1.85;
    letter-spacing: 0.2px;
    -webkit-font-smoothing: none;
    image-rendering: pixelated;
  }

  /* 화면(페이지) 컨테이너 : 한 번에 한 화면만 표시 */
  .screen {
    display: none;
    min-height: 100%;
    width: 100%;
    max-width: 680px;
    margin: 0 auto;
    /* 상단 정렬 + 약간의 상단 여백 */
    padding: 48px 22px 56px;
    flex-direction: column;
    align-items: stretch;
    justify-content: flex-start;
    text-align: left;
  }
  .screen.active { display: flex; }

  /* 문항 텍스트 */
  .question {
    white-space: pre-wrap;
    word-break: keep-all;
    margin-bottom: 30px;
  }

  /* parts 구조에서 인용 상자 사이 텍스트 조각 */
  .part-text { margin-bottom: 18px; }
  .part-text:last-of-type { margin-bottom: 30px; }

  /* 첫 페이지 제목 (가운데 정렬, 굵게) */
  .part-title {
    text-align: center;
    font-weight: bold;
    word-break: keep-all;
    margin: 8px 0 22px;
  }

  /* 인용 상자 */
  .quote-box {
    white-space: pre-wrap;
    word-break: keep-all;
    border: none;
    border-left: 3px solid #aaa;
    background: #0d0d0d;
    padding: 16px 16px;
    margin-bottom: 18px;
    font-size: 15px;
    line-height: 1.75;
  }

  /* 보기 목록 */
  .options {
    display: flex;
    flex-direction: column;
    gap: 14px;
    align-items: stretch;
  }

  .opt {
    display: block;
    width: 100%;
    text-align: left;
    background: transparent;
    color: #ffffff;
    border: 1px solid #444;
    padding: 13px 14px;
    font-family: inherit;
    font-size: inherit;
    line-height: 1.6;
    cursor: pointer;
    white-space: pre-wrap;
    word-break: keep-all;
  }
  .opt:hover { background: #161616; }
  .opt:active { background: #262626; }
  .opt:focus-visible { outline: 2px solid #ffffff; outline-offset: 2px; }

  /* 결과 1페이지 */
  .result-title {
    font-weight: bold;
    font-size: 21px;
    margin-bottom: 26px;
    word-break: keep-all;
  }
  .result-body {
    white-space: pre-wrap;
    word-break: keep-all;
  }
  .result-body strong { font-weight: bold; }

  /* 다음 버튼 */
  .next-wrap { margin-top: 40px; }
  .next-btn {
    display: inline-block;
    background: transparent;
    color: #ffffff;
    border: 1px solid #ffffff;
    padding: 11px 26px;
    font-family: inherit;
    font-size: inherit;
    cursor: pointer;
  }
  .next-btn:hover { background: #1c1c1c; }
  .next-btn:active { background: #2a2a2a; }
  .next-btn:focus-visible { outline: 2px solid #ffffff; outline-offset: 2px; }

  /* 마지막 페이지 버튼 가로 배치 (재검사 | 종료) */
  .btn-row {
    display: flex;
    flex-direction: row;
    flex-wrap: wrap;
    gap: 12px;
  }

  /* 결과 2페이지 : 두 문장 각각 1줄로 (총 2줄) */
  #screen-final2 {
    justify-content: center;
  }
  .final2-line {
    width: 100%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: clip;
    /* 폭에 맞춰 줄어드는 글자 크기 */
    font-size: clamp(8px, 4.4vw, 19px);
    line-height: 2.2;
  }
</style>
</head>
<body>

"- 실종자 다발 현상 지역 파악 및 관련 대책 수립\n" +
"- 실종자 오염 정도에 따른 구조 우선 순위 판단 및 구조 포기 인원 선정\n\n" +
"<strong>(기타)</strong> \n재해대응본부는 귀하와 ■■ 관계인 ■■■■■재해 실종자 ■■■님의 생환을 바랍니다. 다만 재해대응본부는 모든 국민의 안전을 목적으로 하며, 불가피한 선택은 언제나 있을 수 있음을 귀하는 인지하여야 합니다.\n\n어리석지 않은 선택을 택하십시오."
    },
    aB: {
      title: "재해진압팀",
      body:
"<strong>(요구역량)</strong>\n" +
"- 이상 현상 인지 능력, 상황 해결 능력\n" +
"- 재해 현장 별 특성에 따른 위험 요인 분석, 현장 점검 관련 장비 운용\n" +
"- 종교, 무속신앙 관련 전문 지식 및 활용능력\n\n" +
"<strong>(주요업무)</strong>\n" +
"- 발생 재해 원인에 따른 진압 계획 수립 및 시행\n" +
"- 사회 재난 발생 시 재해 연계 전망에 따른 선제적 대응 계획 수립 및 시행\n" +
"- ■■■ ■■■ ■■■■ ■■■ ■■■■■ ■■■■■■ ■■■■\n\n" +
"<strong>(기타)</strong> \n■■■■ ■■■■ ■■■ ■■■■ ■■■ ■■■■■■ ■■■■ ■■ ■■■■ ■■■■■■ ■■■ ■■ ■■■■ ■■■■■ ■■■■■ ■■ ■■■ ■■■ ■■■\n\n" +
"지시사항이 없습니다. \n자유롭게 행동하십시오."
    },
    ab: {
      title: "현장분석팀",
      body:
"<strong>(요구역량)</strong>\n" +
"- 이상현상 인지 능력, 현장 대응 능력\n" +
"- 재해 현장 점검 관련 장비 운용 능력\n" +
"- 지시 사항에 대한 맹목적 복종\n\n" +
"<strong>(주요업무)</strong>\n" +
"- 재해 현장 점검 및 위험 요인 분석\n\n" +
"<strong>(기타)</strong> \n어리석은 자의 미덕은 맹목에 있습니다.\n" +
"의심하지 마십시오.\n" +
"판단을 멈추고 지시에 응하십시오.\n" +
"귀하의 모든 행적에 가치가 있음을 알립니다.\n\n" +
"귀하의 희생에 감사를 표합니다."
    },
    C: {
      title: "부적격 판정",
      body:
"귀하의 역량은 출중하나 재해대응본부에서 요구하는 인재상에는 적합하지 않습니다.\n" +
"재해대응본부 채용절차에서 보여주신 관심과 열정에 감사드립니다.\n" +
"화면을 종료하신 후 안내되는 지시사항에 응해주시길 바랍니다.\n" +
"의문도 의심도 가지지 마십시오.\n\n" +
"귀하에겐 처음부터 없던 것이었습니다."
    }
  };

  /* =========================================================
     결과 2페이지 문구 (9번 문항 응답에 따라 분기)
     첫 줄 / 둘째 줄을 분리하여 각각 1줄로 출력
     ========================================================= */
  const FINAL2 = {
    free:    { l1: "현재까지 수신된 지시사항은 없습니다.", l2: "다음 지시까지 자유롭게 행동하십시오." },
    wait:    { l1: "현재까지 수신된 지시사항은 없습니다.", l2: "다음 지시를 기다리십시오." },
    nothing: { l1: "현재까지 수신된 지시사항은 없습니다.", l2: "아무것도 하지 마십시오." },
    close:   { l1: "현재까지 수신된 지시사항은 없습니다.", l2: "눈을 감으세요." }
  };

  /* =========================================================
     상태값
     ========================================================= */
  const state = {
    idx: 0,
    cog: 0,   // 인지
    res: 0,   // 해결
    rej: 0,   // 폐급
    q9key: null
  };

  const app = document.getElementById("app");

  function clearApp() { app.innerHTML = ""; }

  /* 한 문항 화면 렌더링 */
  function renderQuestion(i) {
    clearApp();
    const q = QUESTIONS[i];

    const screen = document.createElement("div");
    screen.className = "screen active";

    if (q.parts) {
      // text / quote 조각을 순서대로 출력
      q.parts.forEach(function (p) {
        if (p.type === "quote") {
          const box = document.createElement("div");
          box.className = "quote-box";
          box.textContent = p.value;
          screen.appendChild(box);
        } else if (p.type === "title") {
          const t = document.createElement("div");
          t.className = "part-title";
          t.textContent = p.value;
          screen.appendChild(t);
        } else {
          const t = document.createElement("div");
          t.className = "question part-text";
          t.textContent = p.value;
          screen.appendChild(t);
        }
      });
    } else {
      const qEl = document.createElement("div");
      qEl.className = "question";
      qEl.textContent = q.text;
      screen.appendChild(qEl);
    }

    const opts = document.createElement("div");
    opts.className = "options";

    q.options.forEach(function (o) {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "opt";
      btn.textContent = o.label;
      btn.addEventListener("click", function () {
        // 점수 누적
        if (o.cog) state.cog += o.cog;
        if (o.res) state.res += o.res;
        if (o.rej) state.rej += o.rej;
        if (o.key) state.q9key = o.key;

        // 다음 화면으로
        if (state.idx < QUESTIONS.length - 1) {
          state.idx += 1;
          renderQuestion(state.idx);
        } else {
          renderResult1();
        }
        window.scrollTo(0, 0);
      });
      opts.appendChild(btn);
    });

    screen.appendChild(opts);
    app.appendChild(screen);
  }

  /* 최종 결과 코드 산출 */
  function computeResultCode() {
    if (state.rej >= 3) return "C";
    const c = state.cog >= 0 ? "A" : "a";
    const r = state.res >= 0 ? "B" : "b";
    return c + r;
  }

  /* 결과 1페이지 렌더링 */
  function renderResult1() {
    clearApp();
    const code = computeResultCode();
    const data = RESULTS[code];

    const screen = document.createElement("div");
    screen.className = "screen active";

    const titleEl = document.createElement("div");
    titleEl.className = "result-title";
    titleEl.textContent = data.title;
    screen.appendChild(titleEl);

    if (data.body) {
      const bodyEl = document.createElement("div");
      bodyEl.className = "result-body";
      bodyEl.innerHTML = data.body;
      screen.appendChild(bodyEl);
    }

    // C 결과는 여기서 종료 → 종료 버튼, 그 외에는 다음 버튼
    if (code !== "C") {
      const wrap = document.createElement("div");
      wrap.className = "next-wrap";
      const next = document.createElement("button");
      next.type = "button";
      next.className = "next-btn";
      next.textContent = "다음";
      next.addEventListener("click", function () {
        renderResult2();
        window.scrollTo(0, 0);
      });
      wrap.appendChild(next);
      screen.appendChild(wrap);
    } else {
      appendExitButton(screen);
    }

    app.appendChild(screen);
  }

  /* 마지막 결과 페이지 버튼 (재검사 + 종료) */
  function appendExitButton(screen) {
    const wrap = document.createElement("div");
    wrap.className = "next-wrap btn-row";

    // 재검사 : 첫 페이지(1번 문항)로 돌아가는 다시 시작 동작
    const restart = document.createElement("button");
    restart.type = "button";
    restart.className = "next-btn restart-btn";
    restart.textContent = "재검사";
    restart.addEventListener("click", function () {
      state.idx = 0;
      state.cog = 0;
      state.res = 0;
      state.rej = 0;
      state.q9key = null;
      document.body.style.background = "#000000";
      renderQuestion(0);
      window.scrollTo(0, 0);
    });

    // 종료
    const exit = document.createElement("button");
    exit.type = "button";
    exit.className = "next-btn exit-btn";
    exit.textContent = "종료";
    exit.addEventListener("click", function () {
      // 스크립트로 연 창이 아니면 window.close()가 막히므로
      // 닫히지 않을 경우 화면을 비워 종료 상태로 전환
      try { window.close(); } catch (e) {}
      app.innerHTML = "";
      document.body.style.background = "#000000";
    });

    wrap.appendChild(restart);
    wrap.appendChild(exit);
    screen.appendChild(wrap);
  }

  /* 결과 2페이지 렌더링 (두 문장 각각 1줄, 사이 줄바꿈) */
  function renderResult2() {
    clearApp();
    const f = FINAL2[state.q9key] || FINAL2.wait;

    const screen = document.createElement("div");
    screen.className = "screen active";
    screen.id = "screen-final2";

    const l1 = document.createElement("div");
    l1.className = "final2-line";
    l1.textContent = f.l1;

    const l2 = document.createElement("div");
    l2.className = "final2-line";
    l2.textContent = f.l2;

    screen.appendChild(l1);
    screen.appendChild(l2);
    appendExitButton(screen);
    app.appendChild(screen);
  }

  /* 시작 : 1번 문항이 첫 페이지 */
  renderQuestion(0);
</script>
</body>
</html>
